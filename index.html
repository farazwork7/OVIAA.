```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVIAA — Carry Confidence</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
margin:0;
background:#f7f4ef;
color:#1a1a1a;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:28px;
letter-spacing:5px;
}

.cart-btn{
background:black;
color:white;
padding:10px 20px;
cursor:pointer;
border:none;
}

.hero{
padding:100px 40px;
text-align:center;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:60px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:60px;
}

.card{
background:white;
padding:20px;
text-align:center;
border:1px solid #eee;
}

.card img{
width:100%;
}

.price{
font-weight:bold;
margin:10px 0;
}

.add-btn{
background:#b8935a;
border:none;
color:white;
padding:10px 20px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.1);
padding:30px;
transition:.3s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.checkout{
background:black;
color:white;
width:100%;
padding:12px;
border:none;
margin-top:20px;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
<div class="logo">OVIAA</div>
<button class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</nav>

<section class="hero">
<h1>Carry Confidence</h1>
<p>Luxury bags designed for modern India</p>
</section>

<section class="products" id="products"></section>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="payNow()">Checkout</button>

</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

/* PRODUCT DATABASE */

const products=[
{
id:1,
name:"Sarai Tote",
price:6499,
img:"https://images.unsplash.com/photo-1590874103328-eac38a683ce7"
},
{
id:2,
name:"Noir Sling",
price:3299,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"
},
{
id:3,
name:"Weekend Duffle",
price:8999,
img:"https://images.unsplash.com/photo-1591561954557-26941169b49e"
},
{
id:4,
name:"Sorrel Bucket",
price:5799,
img:"https://images.unsplash.com/photo-1548036328-c9fa89d128fa"
}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

/* LOAD PRODUCTS */

function loadProducts(){

let container=document.getElementById("products")

products.forEach(p=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button class="add-btn" onclick="addToCart(${p.id})">
Add to Cart
</button>

</div>

`

})

}

loadProducts()

/* ADD TO CART */

function addToCart(id){

let product=products.find(p=>p.id===id)

cart.push(product)

saveCart()

}

/* SAVE CART */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

/* UPDATE CART */

function updateCart(){

let items=document.getElementById("cart-items")
let total=0

items.innerHTML=""

cart.forEach((item,index)=>{

total+=item.price

items.innerHTML+=`

<div class="cart-item">

${item.name}

<span>₹${item.price}</span>

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("count").innerText=cart.length

}

updateCart()

/* CART TOGGLE */

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

/* PAYMENT */

function payNow(){

let total=cart.reduce((sum,item)=>sum+item.price,0)

var options = {
key: "YOUR_RAZORPAY_KEY",
amount: total*100,
currency: "INR",
name: "OVIAA",
description: "Bag Purchase",
handler: function (response){
alert("Payment Successful!")
cart=[]
saveCart()
toggleCart()
}
};

var rzp1 = new Razorpay(options);
rzp1.open();

}

</script>

</body>
</html>
